name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- Checkout ----------------
      - name: Checkout code
        uses: actions/checkout@v6

      # ---------------- Setup Node ----------------
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # ---------------- Backend ----------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Lint backend
        run: |
          cd backend
          npx eslint .

      # ---------------- Frontend ----------------
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ---------------- Start Backend ----------------
      - name: Start backend server
        run: |
          cd backend
          node index.js &

      # ---------------- Start Frontend (Production Mode) ----------------
      - name: Start frontend server
        run: |
          cd frontend
          npm run preview -- --port 5173 &

      # ---------------- Wait for Services ----------------
      - name: Wait for servers to be ready
        run: |
          npx wait-on http://localhost:5173
          npx wait-on http://localhost:5000

      # ---------------- E2E Testing ----------------
      - name: Run Cypress E2E tests
        run: |
          cd frontend
          npx cypress run