name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Avoid unnecessary runs from Dependabot
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      # ---------------- Setup ----------------
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # ---------------- Backend ----------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Lint backend
        run: |
          cd backend
          npx eslint .

      # ---------------- Frontend ----------------
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ---------------- Start Services ----------------
      - name: Start backend server
        run: |
          cd backend
          node index.js &

      - name: Start frontend server
        run: |
          cd frontend
          npm run dev &

      # ---------------- Wait (IMPORTANT) ----------------
      - name: Wait for servers to start
        run: sleep 10

      # ---------------- E2E Testing ----------------
      - name: Run Cypress E2E tests
        run: |
          cd frontend
          npx cypress run