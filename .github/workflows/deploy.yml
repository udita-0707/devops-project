# ============================================================
# GitHub Actions — Terraform Deployment Pipeline
# AWS Academy Compatible (No ECR push, No IAM creation)
# Uses existing LabRole + Terraform-managed infrastructure
# ============================================================

name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  TF_VERSION: 1.14.8

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout Repository ───────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS Credentials ────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # ── Step 3: Setup Terraform ──────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Step 4: Terraform Version Check ──────────────────
      - name: Terraform Version Check
        working-directory: terraform
        run: terraform version

      # ── Step 5: Terraform Format Check ───────────────────
      - name: Terraform Fmt Check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform formatting is valid"

      # ── Step 6: Terraform Init ───────────────────────────
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -upgrade -input=false || \
          (rm -rf .terraform .terraform.lock.hcl && terraform init -upgrade -input=false)
          echo "✅ Terraform initialized"

      # ── Step 7: Terraform Validate ───────────────────────
      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid"

      # ── Step 8: Terraform Plan ───────────────────────────
      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -input=false -out=tfplan
          echo "✅ Terraform plan complete"

      # ── Step 9: Terraform Apply ──────────────────────────
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -input=false -auto-approve tfplan
          echo "✅ Infrastructure provisioned successfully"

      # ── Step 10: Deployment Summary ──────────────────────
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  Region : us-east-1"
          echo "  Cluster: devops-cluster"
          echo "  Commit : ${{ github.sha }}"
          echo "============================================"
          echo ""
          echo "👉 Check AWS Console → ECS → Clusters → devops-cluster"